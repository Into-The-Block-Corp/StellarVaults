name: Build and Release Contracts

# Builds and releases the vault and escrow contracts via stellar-expert's
# reusable build workflow (SEP-0055 source verification). Using their workflow
# is required: stellar.expert only validates attestations whose builder is
# stellar-expert/soroban-build-workflow, and that workflow also registers each
# build with stellar.expert's source-code matching service.
#
# The reusable workflow is pinned to a commit SHA (not a moving @main) for
# reproducibility and supply-chain safety. It builds one package per call, so
# vault and escrow are separate jobs, each producing its own release + attestation.
#
# Triggered by pushing a `v*` tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`)
# or manually via the Actions tab with a release name.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Version (e.g. v0.0.0)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  vault:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ inputs.release_name || github.ref_name }}
      package: vault
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  escrow:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ inputs.release_name || github.ref_name }}
      package: escrow
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
